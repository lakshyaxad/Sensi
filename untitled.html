<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Terminal - Prank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        body {
            font-family: 'Courier Prime', monospace;
            background-color: #000000;
            color: #00ff00;
            overflow: hidden;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== Flicker Effect ===== */
        @keyframes flicker {
            0% {
                opacity: 1;
            }
            5% {
                opacity: 0.8;
            }
            10% {
                opacity: 1;
            }
            15% {
                opacity: 0.85;
            }
            20% {
                opacity: 1;
            }
            100% {
                opacity: 1;
            }
        }

        @keyframes glitch {
            0% {
                transform: translate(0);
            }
            20% {
                transform: translate(-2px, 2px);
            }
            40% {
                transform: translate(-2px, -2px);
            }
            60% {
                transform: translate(2px, 2px);
            }
            80% {
                transform: translate(2px, -2px);
            }
            100% {
                transform: translate(0);
            }
        }

        @keyframes screenShake {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            10% {
                transform: translate(-5px, -5px) rotate(0.5deg);
            }
            20% {
                transform: translate(5px, 5px) rotate(-0.5deg);
            }
            30% {
                transform: translate(-5px, 5px) rotate(0.5deg);
            }
            40% {
                transform: translate(5px, -5px) rotate(-0.5deg);
            }
            50% {
                transform: translate(-3px, -3px) rotate(0.3deg);
            }
            60% {
                transform: translate(3px, 3px) rotate(-0.3deg);
            }
            70% {
                transform: translate(-2px, 2px) rotate(0.2deg);
            }
            80% {
                transform: translate(2px, -2px) rotate(-0.2deg);
            }
            90% {
                transform: translate(-1px, -1px) rotate(0.1deg);
            }
        }

        @keyframes progressFill {
            0% {
                width: 0%;
            }
            100% {
                width: 100%;
            }
        }

        @keyframes typing {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }

        @keyframes blink {
            0%, 50% {
                border-right-color: #00ff00;
            }
            51%, 100% {
                border-right-color: transparent;
            }
        }

        @keyframes scanlines {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(10px);
            }
        }

        @keyframes pulseText {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* ===== Main Container ===== */
        .container {
            width: 95%;
            max-width: 1000px;
            height: 95%;
            background-color: #0a0a0a;
            border: 2px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5), inset 0 0 20px rgba(0, 0, 0, 0.5);
            padding: 2rem;
            position: relative;
            overflow: hidden;
            animation: flicker 0.15s infinite;
        }

        /* Scanlines effect */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 0%,
                rgba(0, 255, 0, 0.05) 50%,
                transparent 100%
            );
            background-size: 100% 10px;
            pointer-events: none;
            animation: scanlines 0.1s linear infinite;
            z-index: 10;
        }

        .content {
            position: relative;
            z-index: 5;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* ===== Header ===== */
        .header {
            margin-bottom: 2rem;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 1rem;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
            margin-bottom: 0.5rem;
            animation: glitch 0.5s infinite;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #00cc00;
            opacity: 0.8;
        }

        /* ===== Info Section ===== */
        .info-section {
            margin-bottom: 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .info-item {
            border: 1px solid #00ff00;
            padding: 1rem;
            background-color: rgba(0, 255, 0, 0.05);
            border-radius: 4px;
        }

        .info-label {
            font-size: 0.85rem;
            color: #00cc00;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-size: 1.1rem;
            color: #00ff00;
            font-weight: 700;
            font-family: 'Courier Prime', monospace;
            word-break: break-all;
        }

        /* ===== Terminal Output ===== */
        .terminal {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid #00ff00;
            padding: 1rem;
            border-radius: 4px;
            max-height: 300px;
        }

        .terminal-line {
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            animation: typing 0.3s steps(40, end);
        }

        .terminal-line.typing::after {
            content: '█';
            animation: blink 0.7s infinite;
            margin-left: 0.2rem;
        }

        .terminal-line.completed {
            animation: none;
            opacity: 0.8;
        }

        .progress-line {
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .progress-bar-container {
            flex: 1;
            height: 20px;
            border: 1px solid #00ff00;
            background-color: rgba(0, 0, 0, 0.5);
            position: relative;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #00cc00);
            width: 0%;
            animation: none;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 1s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        .progress-text {
            font-size: 0.9rem;
            min-width: 50px;
            text-align: right;
        }

        /* ===== Access Granted Message ===== */
        .access-message {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            animation: screenShake 0.8s ease-in-out;
        }

        .access-message.show {
            display: flex;
        }

        .access-text {
            font-size: 4rem;
            font-weight: 700;
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            letter-spacing: 3px;
            animation: pulseText 0.5s ease-in-out infinite;
            text-align: center;
        }

        .prank-reveal {
            font-size: 2.5rem;
            font-weight: 700;
            color: #00ff00;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            text-align: center;
            margin-top: 1rem;
            animation: slideInUp 0.8s ease-out 2s both;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== Restart Button ===== */
        .restart-btn {
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: #000000;
            border: 2px solid #00ff00;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Courier Prime', monospace;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            animation: slideInUp 0.8s ease-out 3s both;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.8);
        }

        .restart-btn:active {
            transform: scale(0.98);
        }

        /* ===== Footer ===== */
        .footer {
            border-top: 1px solid #00ff00;
            padding-top: 1rem;
            font-size: 0.85rem;
            text-align: center;
            color: #00cc00;
            opacity: 0.7;
        }

        .loading-dots {
            display: inline-block;
        }

        .loading-dots::after {
            content: '.';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% {
                content: '.';
            }
            40% {
                content: '..';
            }
            60% {
                content: '...';
            }
            80%, 100% {
                content: '';
            }
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .info-section {
                grid-template-columns: 1fr;
            }

            .title {
                font-size: 1.2rem;
            }

            .terminal {
                max-height: 250px;
                font-size: 0.9rem;
            }

            .access-text {
                font-size: 2.5rem;
            }

            .prank-reveal {
                font-size: 1.8rem;
            }

            .restart-btn {
                padding: 0.8rem 1.5rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0.75rem;
                border-width: 1px;
            }

            .title {
                font-size: 1rem;
            }

            .info-item {
                padding: 0.75rem;
                font-size: 0.8rem;
            }

            .info-value {
                font-size: 0.9rem;
            }

            .terminal {
                max-height: 200px;
                font-size: 0.8rem;
                padding: 0.75rem;
            }

            .access-text {
                font-size: 2rem;
                letter-spacing: 2px;
            }

            .prank-reveal {
                font-size: 1.3rem;
            }

            .restart-btn {
                padding: 0.7rem 1.2rem;
                font-size: 0.8rem;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>
    <!-- Main Container -->
    <div class="container">
        <div class="content">
            <!-- Header -->
            <div class="header">
                <div class="title">[ SYSTEM HACKED ]</div>
                <div class="subtitle">>>> Advanced Security Breach Detected <<<</div>
            </div>

            <!-- Info Section -->
            <div class="info-section">
                <div class="info-item">
                    <div class="info-label">TARGET IP ADDRESS</div>
                    <div class="info-value" id="ipAddress">192.168.1.1</div>
                </div>
                <div class="info-item">
                    <div class="info-label">LOCATION</div>
                    <div class="info-value" id="location">Unknown</div>
                </div>
                <div class="info-item">
                    <div class="info-label">SYSTEM STATUS</div>
                    <div class="info-value" id="status">BREACHED</div>
                </div>
                <div class="info-item">
                    <div class="info-label">ELAPSED TIME</div>
                    <div class="info-value" id="timer">00:00</div>
                </div>
            </div>

            <!-- Terminal Output -->
            <div class="terminal" id="terminal">
                <div class="terminal-line typing" id="line1"></div>
                <div class="terminal-line typing" id="line2"></div>
                <div class="terminal-line typing" id="line3"></div>
                <div class="terminal-line typing" id="line4"></div>
                <div class="progress-line" id="progressLine" style="display: none;">
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">0%</div>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                STATUS: PROCESSING <span class="loading-dots"></span>
            </div>
        </div>
    </div>

    <!-- Access Granted Message -->
    <div class="access-message" id="accessMessage">
        <div class="access-text" id="accessText">ACCESS GRANTED</div>
        <div class="prank-reveal" id="prankReveal">Relax 😄 This is just a prank!</div>
        <button class="restart-btn" id="restartBtn" onclick="restartPrank()">Restart Prank</button>
    </div>

    <script>
        // ===== Configuration =====
        const config = {
            typingSpeed: 50,
            lineDelay: 800,
            progressDuration: 8000,
            revealDelay: 10000,
            messages: [
                'Connecting to server...',
                'Bypassing firewall...',
                'Accessing personal files...',
                'Downloading data...'
            ]
        };

        // ===== Fake Data Generation =====
        function generateFakeIP() {
            return Array(4).fill(0).map(() => Math.floor(Math.random() * 256)).join('.');
        }

        function generateFakeLocation() {
            const locations = [
                'New York, USA',
                'London, UK',
                'Tokyo, Japan',
                'Sydney, Australia',
                'Berlin, Germany',
                'Moscow, Russia',
                'Dubai, UAE',
                'Singapore',
                'Toronto, Canada',
                'São Paulo, Brazil',
                'Mumbai, India',
                'Hong Kong'
            ];
            return locations[Math.floor(Math.random() * locations.length)];
        }

        // ===== DOM Elements =====
        const terminal = document.getElementById('terminal');
        const progressLine = document.getElementById('progressLine');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const ipAddress = document.getElementById('ipAddress');
        const location = document.getElementById('location');
        const timer = document.getElementById('timer');
        const accessMessage = document.getElementById('accessMessage');
        const restartBtn = document.getElementById('restartBtn');

        // ===== State =====
        let startTime = Date.now();
        let timerInterval = null;

        // ===== Functions =====

        /**
         * Type text with effect
         */
        function typeText(element, text, speed = 50) {
            return new Promise((resolve) => {
                let index = 0;
                element.textContent = '';

                function type() {
                    if (index < text.length) {
                        element.textContent += text[index];
                        index++;
                        setTimeout(type, speed);
                    } else {
                        resolve();
                    }
                }

                type();
            });
        }

        /**
         * Show lines with typing effect
         */
        async function showMessages() {
            const lines = document.querySelectorAll('.terminal-line.typing');

            for (let i = 0; i < config.messages.length; i++) {
                if (i < lines.length) {
                    await typeText(lines[i], config.messages[i], config.typingSpeed);
                    lines[i].classList.remove('typing');
                    lines[i].classList.add('completed');
                    await new Promise(r => setTimeout(r, config.lineDelay));
                }
            }
        }

        /**
         * Animate progress bar
         */
        function animateProgressBar() {
            progressLine.style.display = 'flex';
            let progress = 0;

            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 100) progress = 100;

                progressFill.style.width = progress + '%';
                progressText.textContent = Math.floor(progress) + '%';

                if (progress >= 100) {
                    clearInterval(interval);
                    progressText.textContent = '100%';
                }
            }, 200);

            setTimeout(() => {
                clearInterval(interval);
                progressFill.style.width = '100%';
                progressText.textContent = '100%';
            }, config.progressDuration);
        }

        /**
         * Update timer
         */
        function updateTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                timer.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }, 100);
        }

        /**
         * Show access granted message
         */
        function showAccessGranted() {
            clearInterval(timerInterval);
            accessMessage.classList.add('show');
            playSound('success');
        }

        /**
         * Play sound effects
